<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{../layout/default}">
<head>
  <title>회원가입</title>
  <th:block layout:fragment="css">
    <style>
      .register-table {
        width: 100%;
        max-width: 800px;
        border-collapse: collapse;
        border-top: 2px solid #333;
      }
      .register-table th, .register-table td {
        padding: 12px 15px;
        border-bottom: 1px solid #e5e7eb;
        vertical-align: top;
      }
      .register-table th {
        width: 180px;
        text-align: left;
        background-color: #fafafa;
        font-weight: 600;
        vertical-align: middle;
      }
      .register-table input[type="text"],
      .register-table input[type="password"],
      .register-table input[type="email"],
      .register-table input[type="date"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
      }
      .flex-row { 
        display: flex; 
        gap: 8px; 
        align-items: center; 
      }
      .btnbar {
        display: flex;
        justify-content: flex-start;
        gap: 10px;
        margin-top: 30px;
        width: 100%;
        max-width: 800px;
      }
      .btnbar .btnset-lg {
        font-size: 16px;
        padding: 0px 24px;
        height: 50px;
      }
      .form-error {
        margin-top: 16px;
        padding: 12px 14px;
        border: 1px solid #fecaca;
        border-radius: 8px;
        background: #fef2f2;
        color: #b91c1c;
      }
      .field-error {
        margin-top: 8px;
        color: #b91c1c;
        font-size: 13px;
        line-height: 1.5;
      }
      .error-summary-title {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .error-summary-list {
        margin: 0;
        padding-left: 18px;
      }
      .input-error {
        border-color: #ef4444 !important;
        background-color: #fff7f7;
      }
    </style>
  </th:block>
</head>
<body>
<div layout:fragment="content">
  <main class="th-layout-main">
    <div class="basic-N23" data-bid="wWM47SwZLN">
      <div class="contents-inner">
        <div class="contents-container container-md">
          
          <div class="textset">
            <img class="imageset-img" src="/resources/images/img_basic_N23_1.png" alt="이미지" th:hoverbox="true">
            <h2 class="textset-tit">회원가입</h2>
            <p class="textset-desc">LapPick 회원이 되어 다양한 혜택을 누려보세요.</p>
          </div>

<form th:action="@{/auth/register/write}" method="post" th:object="${registerRequest}">
          <div class="form-error" th:if="${#fields.hasAnyErrors()}">
            <strong class="error-summary-title">입력 내용을 다시 확인해주세요.</strong>
            <ul class="error-summary-list">
              <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
            </ul>
          </div>
          <table class="register-table">
              <tbody>
                <tr>
                  <th><label for="memberId">아이디</label></th>
                  <td>
                    <input type="text" th:field="*{memberId}" th:classappend="${#fields.hasErrors('memberId')} ? 'input-error'" placeholder="아이디 (5~12자 영문, 숫자)" required>
                    <div class="field-error" th:if="${#fields.hasErrors('memberId')}" th:errors="*{memberId}"></div>
                  </td>
                </tr>
                <tr>
                  <th><label for="memberPw">비밀번호</label></th>
                  <td>
                    <input type="password" th:field="*{memberPw}" th:classappend="${#fields.hasErrors('memberPw')} ? 'input-error'" placeholder="비밀번호 (8자 이상)" required>
                    <div class="field-error" th:if="${#fields.hasErrors('memberPw')}" th:errors="*{memberPw}"></div>
                  </td>
                </tr>
                <tr>
                  <th><label for="memberPwCon">비밀번호 확인</label></th>
                  <td>
                    <input type="password" th:field="*{memberPwCon}" th:classappend="${#fields.hasErrors('memberPwCon')} ? 'input-error'" placeholder="비밀번호를 다시 입력하세요" required>
                    <div class="field-error" th:if="${#fields.hasErrors('memberPwCon')}" th:errors="*{memberPwCon}"></div>
                  </td>
                </tr>
                <tr>
                  <th><label for="memberName">이름</label></th>
                  <td>
                    <input type="text" th:field="*{memberName}" th:classappend="${#fields.hasErrors('memberName')} ? 'input-error'" placeholder="이름 (예: 홍길동)" required>
                    <div class="field-error" th:if="${#fields.hasErrors('memberName')}" th:errors="*{memberName}"></div>
                  </td>
                </tr>
                <tr>
                  <th><label for="memberEmail">이메일</label></th>
                  <td>
                    <input type="email" th:field="*{memberEmail}" th:classappend="${#fields.hasErrors('memberEmail')} ? 'input-error'" placeholder="예: user@example.com" required>
                    <div class="field-error" th:if="${#fields.hasErrors('memberEmail')}" th:errors="*{memberEmail}"></div>
                  </td>
                </tr>
                <tr>
                  <th><label for="memberPhone1">휴대폰 번호</label></th>
                  <td>
                    <input type="text" th:field="*{memberPhone1}" 
                           th:classappend="${#fields.hasErrors('memberPhone1')} ? 'input-error'"
                           placeholder="'-' 없이 숫자 11자리 입력 (010...)" 
                           maxlength="11" 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
                           required>
                    <div class="field-error" th:if="${#fields.hasErrors('memberPhone1')}" th:errors="*{memberPhone1}"></div>
                  </td>
                </tr>
                <tr>
                  <th><label for="memberPhone2">추가 연락처 (선택)</label></th>
                  <td><input type="text" th:field="*{memberPhone2}"
                             placeholder="'-' 없이 숫자만 입력 (선택)"
                             maxlength="11"
                             oninput="this.value = this.value.replace(/[^0-9]/g, '');"></td>
                </tr>
                <tr>
                  <th><label for="memberBirth">생년월일</label></th>
                  <td>
                    <input type="date" th:field="*{memberBirth}" th:classappend="${#fields.hasErrors('memberBirth')} ? 'input-error'" required>
                    <div class="field-error" th:if="${#fields.hasErrors('memberBirth')}" th:errors="*{memberBirth}"></div>
                  </td>
                </tr>
                <tr>
                  <th>성별</th>
                  <td>
                    <div class="flex-row">
                      <label class="flex-row"><input type="radio" th:field="*{gender}" value="M">&nbsp;남</label>
                      <label class="flex-row" style="margin-left: 15px;"><input type="radio" th:field="*{gender}" value="F">&nbsp;여</label>
                    </div>
                  </td>
                </tr>
                <tr>
                  <th>주소</th>
                  <td>
                    <div class="flex-row">
                      <input type="text" th:field="*{memberPost}" id="sample4_postcode" placeholder="우편번호" style="width: 120px; flex-grow: 0;" readonly>
                      <button type="button" onclick="execDaumPostcode();" class="btnset btnset-line" style="height: 36px; padding: 0 12px; font-size: 13px; flex-shrink: 0;">우편번호 찾기</button>
                    </div>
                    <input type="text" th:field="*{memberAddr}" th:classappend="${#fields.hasErrors('memberAddr')} ? 'input-error'" id="sample4_roadAddress" placeholder="도로명주소" readonly style="margin-top: 8px;">
                    <input type="text" th:field="*{memberAddrDetail}" placeholder="상세주소 입력" style="margin-top: 8px;">
                    <div class="field-error" th:if="${#fields.hasErrors('memberAddr')}" th:errors="*{memberAddr}"></div>
                  </td>
                </tr>
                <tr>
                  <td colspan="2" style="text-align: center; padding: 20px;">
                    <div class="flex-row" style="justify-content: center;">
                      <input id="agree-checkbox" type="checkbox" required style="width: auto; height: auto;">
                      <label for="agree-checkbox" style="margin-left: 5px;">개인정보처리방침에 동의합니다.</label>
                      <a href="javascript:openAgreement();" style="margin-left: 10px; text-decoration: underline;">[내용보기]</a>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
            <div class="btnbar">
              <button class="btnset btnset-lg" type="submit">회원가입 완료</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
<th:block layout:fragment="script">
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script>
    function execDaumPostcode() {
      new daum.Postcode({
        oncomplete: function(data) {
          document.getElementById('sample4_roadAddress').value = data.roadAddress;
          document.getElementById('sample4_postcode').value = data.zonecode;
        }
      }).open();
    }
    
    function openAgreement() {
      window.open('/auth/register/agree', '_blank', 'width=800,height=600,scrollbars=yes');
    }
  </script>
</th:block>
</body>
</html>
