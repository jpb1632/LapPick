<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{../layout/default}">
<head>
    <title>직원_상품문의관리</title>
    <th:block layout:fragment="css">
        <style>
            .item-table { table-layout: fixed; width: 100%; border-collapse: collapse; }
            .item-table th, .item-table td { vertical-align: middle; padding: 12px 8px; border-bottom: 1px solid #eee; }
            .item-table thead tr { background: #f9fafb; }
            .item-table th,
            .item-table .qna-title-row > td {
                text-align: center;
            }
            .status-badge { display: inline-block; padding: 4px 10px; font-size: 12px; border-radius: 12px; color: #fff; }
            .status-badge.waiting { background-color: #dc3545; }
            .status-badge.completed { background-color: #007bff; }
            .qna-title-row { cursor: pointer; }
            .qna-title-row:hover { background-color: #f5f5f5; }
            .qna-content-row { display: none; }
            .qna-content-cell {
    padding: 20px 20px !important; 
    text-align: left; background-color: #f8f9fa;
    line-height: 1.6; border-left: 3px solid #dee2e6;
}
            .answer-form {
                margin-top: 25px;
            }
            .answer-form textarea { width: 100%; min-height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
            .answer-form .btn-bar { text-align: right; margin-top: 10px; }
            
            .pagination-container { 
                display:flex; 
                gap:6px; 
                justify-content:center; 
                align-items:center; 
                margin-top:40px; 
            }
            .pagination-container .page-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 32px; 
                height: 32px;
                padding: 0; 
                font-size: 13px;
                font-weight: 500;
                text-align: center;
                text-decoration: none;
                color: #555;
                background-color: #fff;
                border: 1px solid #ccc;
                border-radius: 4px;
                cursor: pointer;
                box-sizing: border-box;
                transition: background-color 0.2s, border-color 0.2s;
            }
            .page-btn:not(.active):not(.disabled):hover {
                background-color: #f0f0f0;
                border-color: #bbb;
            }
            .pagination-container .page-btn.active {
                background-color: #333;
                color: #fff;
                border-color: #333;
                font-weight: bold;
                cursor: default;
            }
            .pagination-container .page-btn.disabled {
                color: #bbb;
                border-color: #e0e0e0;
                cursor: default;
                background-color: #f9f9f9;
                pointer-events: none;
            }
            .pagination-container .page-btn.disabled:hover {
                 background-color: #f9f9f9;
                 border-color: #e0e0e0;
            }

            .qna-box, .answer-box { display: flex; gap: 20px; align-items: flex-start; }
            .answer-box { margin-top: 25px; padding-top: 25px; border-top: 1px dashed #ced4da; }
            .qa-icon { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: #fff; }
            .qa-icon.question { background-color: #495057; }
            .qa-icon.answer { background-color: #0056b3; }
            .qa-main { flex-grow: 1; }
            .qa-meta { font-size: 14px; color: #6c757d; margin-bottom: 12px; }
            .qa-meta .author { font-weight: 600; color: #343a40; }
            .qa-text { font-size: 16px; white-space: pre-wrap; margin: 0; color: #212529; }
            
            .manage-btn { 
                display: inline-block; padding: 5px 10px; font-size: 12px; 
                text-align: center; text-decoration: none; border-radius: 4px; 
                cursor: pointer; margin: 0 2px; white-space: nowrap; 
                border: 1px solid transparent; 
                color: #fff; background-color: #dc3545; border-color: #dc3545;
            }
            .manage-btn:hover { background-color: #c82333; border-color: #bd2130; }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <main class="th-layout-main">
        <div class="basic-N23" data-bid="empQnaList">
            <div class="contents-inner">
                <div class="contents-container container-md">
                    <div class="textset" style="margin-bottom:14px;">
                        <img class="imageset-img" src="/resources/images/img_basic_N23_1.png" alt="이미지">
                        <h2 class="textset-tit">상품 문의 관리</h2>
                        <p class="textset-desc">고객의 상품 문의를 확인하고 답변을 등록합니다.</p>
                        <div class="alert" th:if="${message}" th:text="${message}" style="background:#e0f7fa;color:#00796b;border:1px solid #b2ebf2;padding:10px 12px;border-radius:6px;margin-top:10px;"></div>
                    </div>

                    <div style="display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap; margin:10px 0 16px;">
                       <form th:action="@{/admin/qna}" method="get" style="display:flex; gap:8px; align-items:center;">
                            <select name="status" onchange="this.form.submit()" style="height:36px; padding:0 10px; border:1px solid #cbd5e1; border-radius:6px;">
                                <option value="">전체 상태</option>
                                <option value="답변대기" th:selected="${status == '답변대기'}">답변대기</option>
                                <option value="답변완료" th:selected="${status == '답변완료'}">답변완료</option>
                            </select>
                            <input type="text" name="searchWord" th:value="${pageData?.searchWord}" placeholder="제목, 상품명, 작성자ID 검색" style="height:36px; padding:0 10px; border:1px solid #cbd5e1; border-radius:6px; min-width:240px;">
                            <button type="submit" class="btnset btnset-line btnset-round">검색</button>
                           <a class="btnset btnset-line btnset-round" th:href="@{/admin/qna}">전체보기</a>
                        </form>
                        <div>
                            <button type="button" class="btnset btnset-line btnset-round" onclick="submitBulkDelete()">선택 삭제</button>
                        </div>
                    </div>
                    
                    <form id="bulkDeleteForm" th:action="@{/admin/qna/delete-bulk}" method="post">
                        <input type="hidden" name="returnUrl" th:value="${currentUrl}" />
                    </form>
                    
                    <table class="item-table">
                            <thead>
                                <tr>
                                    <th style="width: 5%;"><input type="checkbox" id="checkAll" form="bulkDeleteForm"></th>
                                    <th style="width: 10%;">상태</th>
                                    <th style="width: 20%;">상품명</th>
                                    <th style="width: 25%;">제목</th>
                                    <th style="width: 15%;">작성자 ID</th>
                                    <th style="width: 10%;">작성일</th>
                                    <th style="width: 10%;">관리</th>
                                </tr>
                            </thead>
                            <tbody> 
                            <th:block th:if="${pageData == null or #lists.isEmpty(pageData.items)}">
                                <tr>
                                    <td colspan="7" style="padding:40px 0; text-align: center;">등록된 문의가 없습니다.</td>
                                </tr>
                            </th:block>
                            <th:block th:unless="${pageData == null or #lists.isEmpty(pageData.items)}" th:each="qna : ${pageData.items}"> 
                                <tr class="qna-title-row" th:data-qna-num="${qna.qnaNum}">
                                    <td><input type="checkbox" name="qnaNums" th:value="${qna.qnaNum}" onclick="event.stopPropagation();" form="bulkDeleteForm"></td>
                                    <td>
                                        <span th:text="${qna.qnaStatus}" class="status-badge"
                                              th:classappend="${qna.qnaStatus == '답변대기'} ? 'waiting' : 'completed'"></span>
                                    </td>
                                    <td th:text="${qna.goodsName}"></td>
                                    <td th:text="${qna.qnaTitle}"></td>
                                    <td th:text="${qna.memberId}"></td>
                                    <td th:text="${#temporals.format(qna.qnaDate, 'yyyy-MM-dd')}"></td>
                                    <td>
                                        <form th:action="@{/admin/qna/delete/{num}(num=${qna.qnaNum})}"
                                              method="post"
                                              style="display:inline-block;"
                                              onclick="event.stopPropagation();">
                                            <input type="hidden" name="returnUrl" th:value="${currentUrl}" />
                                            <button type="submit"
                                                    class="manage-btn"
                                                    onclick="return confirm('이 문의를 삭제하시겠습니까?');">삭제</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr class="qna-content-row" th:id="'qna-content-' + ${qna.qnaNum}">
                                   <td colspan="7" class="qna-content-cell">
                                        <div class="qna-box">
                                            <div class="qa-icon question">Q</div>
                                            <div class="qa-main">
                                                <div class="qa-meta">
                                                    <span class="author" th:text="${qna.memberId}"></span>
                                                    <span class="date" th:text="${#temporals.format(qna.qnaDate, 'yyyy.MM.dd HH:mm')}"></span>
                                                </div>
                                                <p class="qa-text" th:text="${qna.qnaContent}"></p>
                                            </div>
                                        </div>
                        
                                        <div class="answer-box" th:if="${qna.answerContent != null}">
                                            <div class="qa-icon answer">A</div>
                                            <div class="qa-main">
                                                <div class="qa-meta">
                                                    <span class="author">LapPick 답변</span>
                                                    <span class="date" th:text="${#temporals.format(qna.answerDate, 'yyyy.MM.dd HH:mm')}"></span>
                                                </div>
                                                <p class="qa-text" th:text="${qna.answerContent}"></p>
                                            </div>
                                        </div>
                        
                                        <form th:if="${qna.answerContent == null}" class="answer-form" th:action="@{/admin/qna/answer}" method="post">
                                            <input type="hidden" name="qnaNum" th:value="${qna.qnaNum}" />
                                          <input type="hidden" name="returnUrl" th:value="${currentUrl}" />
                                            <textarea name="answerContent" placeholder="답변을 입력하세요." required></textarea>
                                            <div th:if="${answerErrorQnaNum == qna.qnaNum and answerBindingResult != null and #fields.hasErrors(answerBindingResult, 'answerContent')}"
                                                 th:errors="${answerBindingResult.getFieldResult('answerContent').value}" style="color:red; font-size:12px;"></div>
                                            <div class="btn-bar">
                                                <button type="submit" class="btnset btnset-sm">답변 등록</button>
                                            </div>
                                        </form>
                                    </td>
                                </tr>
                            </th:block>
                        </tbody>
                    </table>
                    <div class="pagination-container" th:if="${pageData != null and pageData.total > 0}">
    
                        <a class="page-btn"
                           th:href="${pageData.page > 1} ? @{/admin/qna(page=1, searchWord=${pageData.searchWord}, status=${status})} : null"
                           th:classappend="${pageData.page <= 1} ? 'disabled' : ''">&lt;&lt;</a>
                           
                        <a class="page-btn"
                           th:href="${pageData.page > 1} ? @{/admin/qna(page=${pageData.page - 1}, searchWord=${pageData.searchWord}, status=${status})} : null"
                           th:classappend="${pageData.page <= 1} ? 'disabled' : ''">&lt;</a>
                    
                        <a class="page-btn" th:each="p : ${#numbers.sequence(pageData.startPage, pageData.endPage)}" th:text="${p}"
                           th:classappend="${pageData.page == p} ? 'active' : ''"
                           th:href="@{/admin/qna(page=${p}, searchWord=${pageData.searchWord}, status=${status})}"></a>
                        
                        <a class="page-btn"
                           th:href="${pageData.page < pageData.totalPages} ? @{/admin/qna(page=${pageData.page + 1}, searchWord=${pageData.searchWord}, status=${status})} : null"
                           th:classappend="${pageData.page >= pageData.totalPages} ? 'disabled' : ''">&gt;</a>
                           
                        <a class="page-btn"
                           th:href="${pageData.page < pageData.totalPages} ? @{/admin/qna(page=${pageData.totalPages}, searchWord=${pageData.searchWord}, status=${status})} : null"
                           th:classappend="${pageData.page >= pageData.totalPages} ? 'disabled' : ''">&gt;&gt;</a>
                   </div>
                </div>
            </div>
    </main>
</div>
<th:block layout:fragment="script">
      <script>
    $(function() {
        $('.qna-title-row').on('click', function() {
            const targetContent = $('#qna-content-' + $(this).data('qna-num'));
            const openContent = $('.qna-content-row:visible');
            if (openContent.length > 0) {
                if (openContent.is(targetContent)) {
                    targetContent.hide();
                } else {
                    openContent.hide();
                    targetContent.css('display', 'table-row');
                }
            } else {
                targetContent.css('display', 'table-row');
            }
        });
        
        $('#checkAll').on('click', function() {
            $('input[name="qnaNums"]').prop('checked', $(this).is(':checked'));
        });
    });
    
    function submitBulkDelete() {
        const checked = $('input[name="qnaNums"]:checked');
        if (checked.length === 0) {
            alert('삭제할 문의를 선택하세요.');
            return;
        }
        
        if (confirm('선택한 ' + checked.length + '개의 문의를 영구 삭제하시겠습니까?')) {
            $('#bulkDeleteForm').submit();
        }
    }
    </script>
</th:block>
</body>
</html>
